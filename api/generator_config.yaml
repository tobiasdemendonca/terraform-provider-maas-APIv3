provider:
  name: maas
  # schema_ref: '#/components/schemas/ProviderMetadata'
  

resources:
  tag:
    create:
      path: /MAAS/a/v3/tags
      method: POST
    read:
      path: /MAAS/a/v3/tags/{tag_id}
      method: GET
    update:
      path: /MAAS/a/v3/tags/{tag_id}
      method: PUT
    delete:
      path: /MAAS/a/v3/tags/{tag_id}
      method: DELETE
    schema:
      ignores:
        - _embedded
        - _links
        - kind
        - tag_id
  fabric:
    create:
      path: /MAAS/a/v3/fabrics
      method: POST
    read:
      path: /MAAS/a/v3/fabrics/{fabric_id}
      method: GET
    update:
      path: /MAAS/a/v3/fabrics/{fabric_id}
      method: PUT
    delete:
      path: /MAAS/a/v3/fabrics/{fabric_id}
      method: DELETE
    schema:
      ignores:
        - _embedded
        - _links
        - kind
        - vlans
